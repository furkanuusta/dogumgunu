<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İyi ki Doğdun!</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa&family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
    }

    /* Açılış Ekranı */
    #intro {
      position: fixed;
      width: 100vw;
      height: 100vh;
      background: #fff0f5;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 1.5s ease;
    }

    .flower {
      width: 120px;
      height: 120px;
      background: radial-gradient(circle at center, #e91e63 40%, transparent 41%),
                  radial-gradient(circle at top left, #f06292 40%, transparent 41%),
                  radial-gradient(circle at top right, #f06292 40%, transparent 41%),
                  radial-gradient(circle at bottom left, #f06292 40%, transparent 41%),
                  radial-gradient(circle at bottom right, #f06292 40%, transparent 41%);
      background-size: 60px 60px;
      background-repeat: no-repeat;
      background-position: center, top left, top right, bottom left, bottom right;
      border-radius: 50%;
      animation: growFade 3s ease-out forwards;
    }

    @keyframes growFade {
      0% { transform: scale(0.2); opacity: 0; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Kalpler ve Yıldızlar */
    .heart-container, .star-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #e91e63;
      transform: rotate(-45deg);
      animation: floatDown 6s linear forwards;
      opacity: 0.8;
    }
    .heart:before,
    .heart:after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: #e91e63;
      border-radius: 50%;
    }
    .heart:before { top: -10px; left: 0; }
    .heart:after  { top: 0; left: 10px; }

    @keyframes floatDown {
      0% { transform: translateY(-10vh) scale(1) rotate(-45deg); opacity: 0.8; }
      100% { transform: translateY(110vh) scale(1.5) rotate(-45deg); opacity: 0; }
    }

    .star {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      filter: drop-shadow(0 0 3px white);
      animation: twinkle 2s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }

    #mainContent {
      display: none;
      animation: fadeIn 2s ease forwards;
      background: linear-gradient(135deg, #ffe4ec 0%, #fbeaff 100%);
      min-height: 100vh;
      padding: 40px 20px 100px;
      text-align: center;
      position: relative;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 60px;
      color: #e91e63;
      margin-bottom: 10px;
      z-index: 10;
      position: relative;
    }

    #sequenceTextContainer {
      font-size: 20px;
      color: #6a1b9a;
      font-weight: 600;
      margin-top: 20px;
      min-height: 50px;
    }

    .photo-container {
      margin-top: 30px;
      width: 260px;
      max-width: 80vw;
      border-radius: 20px;
      box-shadow: 0 12px 25px rgba(0,0,0,0.25);
      overflow: hidden;
      margin-left: auto;
      margin-right: auto;
    }
    .photo-container img {
      width: 100%;
      height: auto;
      border-radius: 20px 20px 0 0;
    }
    .caption {
      font-family: 'Comfortaa', cursive;
      font-size: 18px;
      color: #6a1b9a;
      font-weight: 600;
      padding: 12px 18px 18px 18px;
      background: #fbeaff;
      border-radius: 0 0 20px 20px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 40px; }
      #sequenceTextContainer { font-size: 16px; }
      .caption { font-size: 15px; padding: 10px; }
      .photo-container { width: 85vw; }
    }
  </style>
</head>
<body>
  <!-- Açılış -->
  <div id="intro">
    <div class="flower"></div>
  </div>

  <!-- Kalpler ve Yıldızlar -->
  <div class="heart-container"></div>
  <div class="star-container"></div>

  <!-- Ana İçerik -->
  <div id="mainContent">
    <h1>İyi ki doğdun...</h1>
    <div id="sequenceTextContainer"></div>
    <div class="photo-container">
      <img src="kucukluk.jpg" alt="Küçüklük Fotoğrafı" />
      <div class="caption">Her zaman bu küçük kız kadar mutlu ol 💜</div>
    </div>
  </div>

  <script>
    // Açılış animasyonu
    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("intro").style.opacity = 0;
        setTimeout(() => {
          document.getElementById("intro").style.display = "none";
          document.getElementById("mainContent").style.display = "block";
        }, 1500);
      }, 3000);
    });

    // Kalpler
    const heartContainer = document.querySelector('.heart-container');
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (4 + Math.random() * 2) + 's';
      heart.style.opacity = Math.random() * 0.6 + 0.4;
      heartContainer.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }
    setInterval(createHeart, 250);

    // Yıldızlar
    const starContainer = document.querySelector('.star-container');
    function createStar() {
      const star = document.createElement('div');
      star.classList.add('star');
      star.style.top = Math.random() * 100 + 'vh';
      star.style.left = Math.random() * 100 + 'vw';
      star.style.animationDuration = (1 + Math.random() * 2) + 's';
      starContainer.appendChild(star);
      setTimeout(() => star.remove(), 4000);
    }
    setInterval(createStar, 150);

    // Sıralı yazılar
    const textContainer = document.getElementById("sequenceTextContainer");
    const messages = [
      "İyi ki doğdun...",
      "İyi ki varsın...",
      "İyi ki tanımışım seni..."
    ];
    let i = 0;
    function showNextMessage() {
      textContainer.textContent = messages[i];
      i = (i + 1) % messages.length;
      setTimeout(showNextMessage, 2500);
    }
    showNextMessage();
  </script>
</body>
</html>
