<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>İyi ki Doğdun!</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa&family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      background: #fff0f5;
    }

    #intro {
      position: fixed;
      width: 100vw;
      height: 100vh;
      background: #fff0f5;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 1.5s ease;
    }

    svg#flower {
      width: 200px;
      height: 200px;
    }

    .draw {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw 1.2s ease forwards;
    }

    @keyframes draw {
      to {
        stroke-dashoffset: 0;
      }
    }

    .grow {
      transform: scale(0);
      opacity: 0;
      animation: grow 0.6s ease-out forwards;
    }

    @keyframes grow {
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .petal {
      transform: scale(0);
      opacity: 0;
      transform-origin: center;
      animation: bloom 0.6s ease-out forwards;
    }

    @keyframes bloom {
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    #mainContent {
      display: none;
      animation: fadeIn 2s ease forwards;
      background: linear-gradient(135deg, #ffe4ec 0%, #fbeaff 100%);
      min-height: 100vh;
      padding: 40px 20px 100px;
      text-align: center;
      position: relative;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 60px;
      color: #e91e63;
      margin-bottom: 10px;
      z-index: 10;
      position: relative;
    }

    #sequenceTextContainer {
      font-size: 20px;
      color: #6a1b9a;
      font-weight: 600;
      margin-top: 20px;
      min-height: 50px;
    }

    .photo-container {
      margin-top: 30px;
      width: 260px;
      max-width: 80vw;
      border-radius: 20px;
      box-shadow: 0 12px 25px rgba(0,0,0,0.25);
      overflow: hidden;
      margin-left: auto;
      margin-right: auto;
    }
    .photo-container img {
      width: 100%;
      height: auto;
      border-radius: 20px 20px 0 0;
    }
    .caption {
      font-family: 'Comfortaa', cursive;
      font-size: 18px;
      color: #6a1b9a;
      font-weight: 600;
      padding: 12px 18px 18px 18px;
      background: #fbeaff;
      border-radius: 0 0 20px 20px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 40px; }
      #sequenceTextContainer { font-size: 16px; }
      .caption { font-size: 15px; padding: 10px; }
      .photo-container { width: 85vw; }
    }
  </style>
</head>
<body>
  <!-- Açılış Buket -->
  <div id="intro">
    <svg id="flower" viewBox="0 0 100 100">
      <!-- Gövde -->
      <line x1="50" y1="100" x2="50" y2="60" stroke="#4caf50" stroke-width="2" class="draw" />
      <!-- Yapraklar -->
      <ellipse cx="45" cy="70" rx="4" ry="2" fill="#81c784" class="grow" style="animation-delay:1.2s"/>
      <ellipse cx="55" cy="70" rx="4" ry="2" fill="#81c784" class="grow" style="animation-delay:1.2s"/>
      <!-- Petaller -->
      <circle cx="50" cy="50" r="10" fill="#f06292" class="petal" style="animation-delay:1.8s"/>
      <circle cx="40" cy="52" r="8" fill="#f8bbd0" class="petal" style="animation-delay:2s"/>
      <circle cx="60" cy="52" r="8" fill="#f8bbd0" class="petal" style="animation-delay:2.2s"/>
      <circle cx="50" cy="40" r="7" fill="#ec407a" class="petal" style="animation-delay:2.4s"/>
    </svg>
  </div>

  <!-- İçerik -->
  <div id="mainContent">
    <h1>İyi ki doğdun...</h1>
    <div id="sequenceTextContainer"></div>
    <div class="photo-container">
      <img src="kucukluk.jpg" alt="Küçüklük Fotoğrafı" />
      <div class="caption">Her zaman bu küçük kız kadar mutlu ol 💜</div>
    </div>
  </div>

  <script>
    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("intro").style.opacity = 0;
        setTimeout(() => {
          document.getElementById("intro").style.display = "none";
          document.getElementById("mainContent").style.display = "block";
        }, 1500);
      }, 4000); // toplam 4sn animasyon süresi
    });

    const textContainer = document.getElementById("sequenceTextContainer");
    const messages = [
      "İyi ki doğdun...",
      "İyi ki varsın...",
      "İyi ki tanımışım seni..."
    ];
    let i = 0;
    function showNextMessage() {
      textContainer.textContent = messages[i];
      i = (i + 1) % messages.length;
      setTimeout(showNextMessage, 2500);
    }
    showNextMessage();
  </script>
</body>
</html>
